<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Telegram Ads script now in head -->
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

    <style>
        body { background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); font-family: sans-serif; padding: 16px; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 12px; border-radius: 8px; }
        .ad-container { min-height: 100px; margin: 20px 0; border: 1px dashed gray; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <h1>My TMA</h1>
    <button onclick="Telegram.WebApp.showAlert('Hello!')">Click me</button>

    <div class="ad-container" id="telegram-ad">
        Loading ad...
    </div>

    <script>
        // Wait for DOM to be ready before initializing the ad controller
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof TelegramAdsController !== 'undefined') {
                window.TelegramAdsController = new TelegramAdsController();
                window.TelegramAdsController.initialize({
                    pubId: "389237",  // Replace with your actual publisher ID
                    appId: "6347",
                });
                console.log('Ad controller initialized');
            } else {
                console.error('TelegramAdsController script not loaded');
                document.getElementById('telegram-ad').innerText = 'Ad script failed to load';
            }

            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        });
    </script>
</body>
</html>
