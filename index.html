
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Telegram Ads SDK -->
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

    <!-- Initialization script with your new pubId -->
    <script>
        // Wait for the DOM to be fully loaded before initializing
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof TelegramAdsController !== 'undefined') {
                window.TelegramAdsController = new TelegramAdsController();
                window.TelegramAdsController.initialize({
                    pubId: "991787",   // Your updated publisher ID
                    appId: "6347",
                });
                console.log('✅ TelegramAdsController initialized with pubId 991787');
            } else {
                console.error('❌ TelegramAdsController not loaded – script may be blocked');
                const adDiv = document.getElementById('telegram-ad');
                if (adDiv) adDiv.innerText = 'Ad script failed to load';
            }

            // Telegram WebApp ready
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        });
    </script>

    <style>
        body {
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        button {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            margin: 20px 0;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.8;
        }
        .ad-container {
            min-height: 120px;
            width: 100%;
            max-width: 400px;
            margin: 20px 0;
            border: 2px dashed var(--tg-theme-hint-color, #aaa);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-hint-color, #666);
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>My TMA</h1>

    <button onclick="Telegram.WebApp.showAlert('Hello!')">Click me</button>

    <!-- Ad container – the ad should appear here -->
    <div class="ad-container" id="telegram-ad">
        ⏳ Loading ad...
    </div>

    <!-- Optional extra check -->
    <script>
        console.log('Body loaded, ad container:', document.getElementById('telegram-ad'));
    </script>
</body>
</html>
