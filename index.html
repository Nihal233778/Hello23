<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .ad-container { min-height: 100px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>My TMA</h1>
    <button onclick="Telegram.WebApp.showAlert('Hello!')">Click me</button>

    <!-- Ad container (try both with and without id) -->
    <div class="ad-container" id="telegram-ad"></div>

    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof TelegramAdsController !== 'undefined') {
                window.TelegramAdsController = new TelegramAdsController();
                window.TelegramAdsController.initialize({
                    pubId: "YOUR_PUBLISHER_ID",  // <-- replace
                    appId: "6347",
                });
            } else {
                console.error('TelegramAdsController not loaded');
            }

            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        });
    </script>
</body>
</html>
