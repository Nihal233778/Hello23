<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>

    <!-- External ad script -->
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

    <!-- Initialization script -->
    <script>
        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
            pubId: "null",
            appId: "6347",
        });
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h1>Telegram Mini App Loaded</h1>
        <p>Ads controller initialized with appId 6347.</p>
        <button id="adButton" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Show Ad</button>
        <p id="status" style="margin-top: 20px; color: #555;"></p>
    </div>

    <script>
        // Button click handler
        document.getElementById('adButton').addEventListener('click', function() {
            const statusEl = document.getElementById('status');
            const controller = window.TelegramAdsController;

            if (!controller) {
                statusEl.innerText = 'Error: TelegramAdsController not found.';
                return;
            }

            // Try to call a common ad method - replace 'showAd' with the actual method name if different
            if (typeof controller.showAd === 'function') {
                try {
                    controller.showAd();
                    statusEl.innerText = 'Ad requested via showAd()';
                } catch (e) {
                    statusEl.innerText = 'Error calling showAd(): ' + e.message;
                }
            } 
            // Fallback: try other common method names
            else if (typeof controller.displayAd === 'function') {
                try {
                    controller.displayAd();
                    statusEl.innerText = 'Ad requested via displayAd()';
                } catch (e) {
                    statusEl.innerText = 'Error calling displayAd(): ' + e.message;
                }
            }
            else {
                statusEl.innerText = 'No known ad method found on controller. Please check the script API.';
                console.log('Available methods on TelegramAdsController:', Object.getOwnPropertyNames(Object.getPrototypeOf(controller)));
            }
        });
    </script>
</body>
</html>
